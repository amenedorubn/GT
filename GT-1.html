<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reforma GT</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0f0f0f;
  --surface: #181818;
  --surface2: #222;
  --border: #2a2a2a;
  --text: #f0ece4;
  --muted: #888;
  --accent: #e8d5a0;

  --h1: #f0c040;
  --h2: #e05050;
  --h3: #5cb85c;
  --h4: #5b9bd5;
  --bano: #d4739a;
  --cocina: #7ec8c8;
  --despensa: #a0b8d0;
  --pasillo: #6070a0;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  overflow-x: hidden;
}

/* ── HEADER ── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 1.2rem 2rem;
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  background: var(--bg);
  z-index: 100;
}

.logo {
  font-family: 'DM Mono', monospace;
  font-size: 1.1rem;
  letter-spacing: 0.08em;
  color: var(--accent);
}

.logo span { color: var(--muted); font-weight: 400; }

.header-stats {
  display: flex;
  gap: 1.5rem;
}

.hstat {
  text-align: right;
}

.hstat-val {
  font-family: 'DM Mono', monospace;
  font-size: 1.1rem;
  color: var(--accent);
}

.hstat-label {
  font-size: 0.7rem;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

/* ── MAIN LAYOUT ── */
main {
  display: grid;
  grid-template-columns: 1fr 420px;
  gap: 0;
  height: calc(100vh - 57px);
}

/* ── FLOOR PLAN ── */
.floor-section {
  padding: 2rem;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.floor-title {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--muted);
  margin-bottom: 1rem;
}

.floor-plan {
  flex: 1;
  position: relative;
}

.floor-svg {
  width: 100%;
  height: 100%;
}

/* Room styles */
.room {
  cursor: pointer;
  transition: all 0.2s;
}

.room rect {
  transition: all 0.2s;
}

.room:hover rect {
  opacity: 0.9;
}

.room.active rect {
  stroke-width: 3;
  filter: drop-shadow(0 0 8px currentColor);
}

.room-label {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  text-anchor: middle;
  dominant-baseline: middle;
  pointer-events: none;
  font-weight: 500;
}

.room-sublabel {
  font-family: 'DM Sans', sans-serif;
  font-size: 9px;
  text-anchor: middle;
  dominant-baseline: middle;
  pointer-events: none;
  opacity: 0.7;
}

.room-progress-text {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  text-anchor: middle;
  dominant-baseline: middle;
  pointer-events: none;
}

/* ── DETAIL PANEL ── */
.detail-panel {
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-header {
  padding: 1.5rem;
  border-bottom: 1px solid var(--border);
}

.panel-room-name {
  font-size: 1.3rem;
  font-weight: 500;
  display: flex;
  align-items: center;
  gap: 10px;
}

.room-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  flex-shrink: 0;
}

.panel-progress-bar {
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  margin-top: 0.8rem;
  overflow: hidden;
}

.panel-progress-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.4s ease;
}

.panel-progress-label {
  font-size: 0.72rem;
  color: var(--muted);
  margin-top: 4px;
  font-family: 'DM Mono', monospace;
}

/* TABS */
.panel-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
}

.ptab {
  flex: 1;
  padding: 0.7rem;
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  text-align: center;
  cursor: pointer;
  color: var(--muted);
  border-bottom: 2px solid transparent;
  transition: all 0.15s;
  background: none;
  border-top: none;
  border-left: none;
  border-right: none;
  font-family: 'DM Mono', monospace;
  color: var(--muted);
}

.ptab.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}

/* PANEL BODY */
.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 1rem 1.2rem;
}

.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-track { background: transparent; }
.panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* TASKS */
.task-item {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 10px 0;
  border-bottom: 1px solid var(--border);
}

.task-item:last-child { border-bottom: none; }

.task-check {
  width: 16px;
  height: 16px;
  margin-top: 2px;
  cursor: pointer;
  accent-color: var(--accent);
  flex-shrink: 0;
}

.task-content { flex: 1; min-width: 0; }

.task-text {
  font-size: 0.85rem;
  line-height: 1.4;
  color: var(--text);
}

.task-done .task-text {
  text-decoration: line-through;
  color: var(--muted);
}

.task-meta {
  display: flex;
  gap: 6px;
  margin-top: 4px;
  flex-wrap: wrap;
  align-items: center;
}

.tag {
  font-size: 0.65rem;
  padding: 2px 7px;
  border-radius: 3px;
  font-family: 'DM Mono', monospace;
  letter-spacing: 0.05em;
}

.tag-pending { background: #2a200a; color: #e8b84b; }
.tag-doing { background: #0a1a2a; color: #5b9bd5; }
.tag-done { background: #0a1e0a; color: #5cb85c; }

.task-date {
  font-size: 0.65rem;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
}

.task-note {
  font-size: 0.7rem;
  color: var(--muted);
  margin-top: 3px;
  font-style: italic;
}

.task-actions { display: flex; gap: 4px; align-items: center; }

.btn-icon {
  background: none;
  border: none;
  cursor: pointer;
  color: var(--muted);
  padding: 3px;
  border-radius: 3px;
  font-size: 14px;
  line-height: 1;
  transition: color 0.15s;
}

.btn-icon:hover { color: var(--text); }

select.state-sel {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--muted);
  font-size: 0.65rem;
  padding: 2px 4px;
  border-radius: 3px;
  font-family: 'DM Mono', monospace;
  cursor: pointer;
}

/* ADD FORM */
.add-form {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 12px;
  margin-top: 12px;
}

.add-form input, .add-form select {
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 7px 10px;
  border-radius: 4px;
  font-family: 'DM Sans', sans-serif;
  font-size: 0.82rem;
  width: 100%;
  margin-bottom: 6px;
}

.add-form input::placeholder { color: var(--muted); }

.form-row {
  display: flex;
  gap: 6px;
  margin-bottom: 6px;
}

.form-row input, .form-row select {
  margin-bottom: 0;
  flex: 1;
}

.btn-primary {
  background: var(--accent);
  color: #111;
  border: none;
  padding: 7px 14px;
  border-radius: 4px;
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  cursor: pointer;
  letter-spacing: 0.05em;
  transition: opacity 0.15s;
  width: 100%;
}

.btn-primary:hover { opacity: 0.85; }

.add-toggle {
  font-size: 0.75rem;
  color: var(--muted);
  cursor: pointer;
  font-family: 'DM Mono', monospace;
  margin-top: 10px;
  display: inline-block;
  border-bottom: 1px dashed var(--muted);
  padding-bottom: 1px;
  transition: color 0.15s;
}

.add-toggle:hover { color: var(--accent); }

.empty-state {
  text-align: center;
  padding: 2.5rem 1rem;
  color: var(--muted);
  font-size: 0.82rem;
}

/* COMPRA */
.compra-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}

.compra-item:last-child { border-bottom: none; }

.compra-text {
  flex: 1;
  font-size: 0.85rem;
}

.compra-done .compra-text {
  text-decoration: line-through;
  color: var(--muted);
}

.compra-price {
  font-size: 0.75rem;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
}

.compra-section-title {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  padding: 10px 0 4px;
}

/* OVERVIEW (no room selected) */
.overview {
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 1rem;
  flex: 1;
  overflow-y: auto;
}

.overview-title {
  font-size: 0.7rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: var(--muted);
  font-family: 'DM Mono', monospace;
  margin-bottom: 0.2rem;
}

.overview-big {
  font-family: 'DM Mono', monospace;
  font-size: 2.8rem;
  color: var(--accent);
  line-height: 1;
}

.overview-total-bar {
  height: 4px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
  margin-top: 0.3rem;
}

.overview-total-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 2px;
  transition: width 0.5s ease;
}

.room-row {
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  transition: opacity 0.15s;
}

.room-row:hover { opacity: 0.75; }

.room-row-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}

.room-row-name {
  font-size: 0.85rem;
  flex: 1;
}

.room-row-pct {
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  color: var(--muted);
}

.room-row-bar {
  width: 60px;
  height: 3px;
  background: var(--border);
  border-radius: 2px;
  overflow: hidden;
}

.room-row-fill {
  height: 100%;
  border-radius: 2px;
}

/* PANEL TABS CONTENT */
.tab-content { display: none; }
.tab-content.active { display: block; }

/* Notification */
.notif {
  position: fixed;
  bottom: 1.5rem;
  right: 1.5rem;
  background: var(--surface);
  border: 1px solid var(--accent);
  color: var(--accent);
  padding: 0.6rem 1rem;
  border-radius: 6px;
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  z-index: 999;
  opacity: 0;
  transform: translateY(10px);
  transition: all 0.2s;
  pointer-events: none;
}

.notif.show { opacity: 1; transform: translateY(0); }

/* Mobile fallback */
@media (max-width: 768px) {
  main { grid-template-columns: 1fr; height: auto; }
  .detail-panel { border-left: none; border-top: 1px solid var(--border); min-height: 60vh; }
  .floor-section { height: 50vw; min-height: 260px; }
}
</style>
</head>
<body>

<header>
  <div class="logo">REFORMA<span>·</span>GT</div>
  <div class="header-stats">
    <div class="hstat">
      <div class="hstat-val" id="stat-pct">0%</div>
      <div class="hstat-label">completado</div>
    </div>
    <div class="hstat">
      <div class="hstat-val" id="stat-tasks">0/0</div>
      <div class="hstat-label">tareas</div>
    </div>
    <div class="hstat">
      <div class="hstat-val" id="stat-compra">0/0</div>
      <div class="hstat-label">compra</div>
    </div>
  </div>
</header>

<main>
  <!-- FLOOR PLAN -->
  <div class="floor-section">
    <div class="floor-title">Plano del bajo · click para ver detalle</div>
    <div class="floor-plan">
      <svg class="floor-svg" viewBox="0 0 700 520" xmlns="http://www.w3.org/2000/svg" id="floorsvg">

        <!-- Outer wall suggestion -->
        <rect x="10" y="10" width="680" height="505" rx="2" fill="none" stroke="#333" stroke-width="1.5" stroke-dasharray="4,4"/>

        <!-- H1 - Habitación 1 (izquierda arriba, amarillo) -->
        <g class="room" id="room-h1" onclick="selectRoom('h1')">
          <rect x="20" y="20" width="195" height="215" rx="4" fill="#f0c04015" stroke="#f0c040" stroke-width="1.5"/>
          <text class="room-label" x="117" y="108" fill="#f0c040">H1</text>
          <text class="room-sublabel" x="117" y="122" fill="#f0c040">Habitación 1</text>
          <text class="room-progress-text" x="117" y="138" fill="#f0c04099" id="prog-h1">0%</text>
        </g>

        <!-- H2 - Habitación 2 (arriba izquierda-centro, rojo) -->
        <g class="room" id="room-h2" onclick="selectRoom('h2')">
          <rect x="230" y="20" width="170" height="215" rx="4" fill="#e0505015" stroke="#e05050" stroke-width="1.5"/>
          <text class="room-label" x="315" y="108" fill="#e05050">H2</text>
          <text class="room-sublabel" x="315" y="122" fill="#e05050">Habitación 2</text>
          <text class="room-progress-text" x="315" y="138" fill="#e0505099" id="prog-h2">0%</text>
        </g>

        <!-- H3 - Sala / centro arriba (verde) -->
        <g class="room" id="room-h3" onclick="selectRoom('h3')">
          <rect x="415" y="20" width="135" height="215" rx="4" fill="#5cb85c15" stroke="#5cb85c" stroke-width="1.5"/>
          <text class="room-label" x="482" y="108" fill="#5cb85c">H3</text>
          <text class="room-sublabel" x="482" y="122" fill="#5cb85c">Sala / Salón</text>
          <text class="room-progress-text" x="482" y="138" fill="#5cb85c99" id="prog-h3">0%</text>
        </g>

        <!-- H4 - Habitación 4 (derecha arriba, azul) -->
        <g class="room" id="room-h4" onclick="selectRoom('h4')">
          <rect x="565" y="20" width="115" height="215" rx="4" fill="#5b9bd515" stroke="#5b9bd5" stroke-width="1.5"/>
          <text class="room-label" x="622" y="108" fill="#5b9bd5">H4</text>
          <text class="room-sublabel" x="622" y="122" fill="#5b9bd5">Habitación 4</text>
          <text class="room-progress-text" x="622" y="138" fill="#5b9bd599" id="prog-h4">0%</text>
        </g>

        <!-- PASILLO - centro (azul oscuro) -->
        <g class="room" id="room-pasillo" onclick="selectRoom('pasillo')">
          <rect x="215" y="248" width="320" height="110" rx="4" fill="#6070a020" stroke="#6070a0" stroke-width="1.5"/>
          <text class="room-label" x="375" y="296" fill="#8090c0">Pasillo</text>
          <text class="room-progress-text" x="375" y="312" fill="#8090c099" id="prog-pasillo">0%</text>
        </g>

        <!-- H1 lower section (the yellow part extends down) -->
        <g class="room" id="room-h1-ext" onclick="selectRoom('h1')" style="pointer-events:all">
          <rect x="20" y="248" width="195" height="130" rx="4" fill="#f0c04010" stroke="#f0c040" stroke-width="1" stroke-dasharray="5,3"/>
        </g>

        <!-- BAÑO (rosa, abajo derecha centro) -->
        <g class="room" id="room-bano" onclick="selectRoom('bano')">
          <rect x="550" y="248" width="130" height="130" rx="4" fill="#d4739a15" stroke="#d4739a" stroke-width="1.5"/>
          <text class="room-label" x="615" y="304" fill="#d4739a">Baño</text>
          <text class="room-progress-text" x="615" y="320" fill="#d4739a99" id="prog-bano">0%</text>
        </g>

        <!-- DESPENSA (abajo, a la izquierda de la cocina) -->
        <g class="room" id="room-despensa" onclick="selectRoom('despensa')">
          <rect x="215" y="375" width="170" height="135" rx="4" fill="#a0b8d015" stroke="#a0b8d0" stroke-width="1.5"/>
          <text class="room-label" x="300" y="435" fill="#a0b8d0">Despensa</text>
          <text class="room-progress-text" x="300" y="451" fill="#a0b8d099" id="prog-despensa">0%</text>
        </g>

        <!-- COCINA (esquina abajo derecha, azul claro) -->
        <g class="room" id="room-cocina" onclick="selectRoom('cocina')">
          <rect x="400" y="375" width="280" height="135" rx="4" fill="#7ec8c815" stroke="#7ec8c8" stroke-width="1.5"/>
          <text class="room-label" x="540" y="435" fill="#7ec8c8">Cocina</text>
          <text class="room-progress-text" x="540" y="451" fill="#7ec8c899" id="prog-cocina">0%</text>
        </g>

        <!-- Compass / scale hint -->
        <text x="30" y="505" fill="#333" font-size="9" font-family="DM Mono, monospace">REFORMA·GT · Plano orientativo</text>

      </svg>
    </div>
  </div>

  <!-- DETAIL PANEL -->
  <div class="detail-panel" id="detail-panel">
    <!-- OVERVIEW (default) -->
    <div class="overview" id="overview-view">
      <div>
        <div class="overview-title">Progreso total de la obra</div>
        <div class="overview-big" id="ov-pct">0%</div>
        <div class="overview-total-bar"><div class="overview-total-fill" id="ov-bar" style="width:0%"></div></div>
      </div>
      <div id="ov-rooms"></div>
      <div>
        <div class="overview-title" style="margin-bottom:8px">Lista de la compra</div>
        <div id="ov-compra-stats" style="font-family:'DM Mono',monospace;font-size:0.85rem;color:var(--muted)"></div>
      </div>
    </div>

    <!-- ROOM DETAIL (hidden until room selected) -->
    <div id="room-view" style="display:none;flex-direction:column;height:100%">
      <div class="panel-header">
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div class="panel-room-name">
            <div class="room-dot" id="panel-dot"></div>
            <span id="panel-name">—</span>
          </div>
          <button class="btn-icon" onclick="closeRoom()" title="Cerrar" style="font-size:18px;color:var(--muted)">✕</button>
        </div>
        <div class="panel-progress-bar"><div class="panel-progress-fill" id="panel-prog-fill" style="width:0%"></div></div>
        <div class="panel-progress-label" id="panel-prog-label">0 de 0 tareas completadas</div>
      </div>

      <div class="panel-tabs">
        <button class="ptab active" onclick="setTab('tasks')" id="tab-tasks">Tareas</button>
        <button class="ptab" onclick="setTab('compra')" id="tab-compra">Compra</button>
        <button class="ptab" onclick="setTab('notas')" id="tab-notas">Notas</button>
      </div>

      <div class="panel-body">
        <!-- TAREAS -->
        <div class="tab-content active" id="tc-tasks">
          <div id="task-list"></div>
          <div id="task-form-area"></div>
        </div>

        <!-- COMPRA -->
        <div class="tab-content" id="tc-compra">
          <div id="compra-list"></div>
          <div id="compra-form-area"></div>
        </div>

        <!-- NOTAS -->
        <div class="tab-content" id="tc-notas">
          <div style="margin-bottom:8px;font-size:0.75rem;color:var(--muted);font-family:'DM Mono',monospace">Notas generales de la habitación</div>
          <textarea id="room-notes" placeholder="Escribe aquí notas generales, medidas, ideas..."
            style="width:100%;min-height:180px;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:0.85rem;resize:vertical;line-height:1.5"
            oninput="saveNotes()"></textarea>
        </div>
      </div>
    </div>
  </div>
</main>

<div class="notif" id="notif"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const proyectoId = location.hash.replace("#", "") || "reforma-general";
const proyectoRef = ref(db, "proyectos/" + proyectoId);

let firebaseReady = false;
let cargandoDesdeFirebase = false;


const ROOMS_DEF = [
  { id:'h1',     name:'Habitación 1', color:'#f0c040', shortName:'H1' },
  { id:'h2',     name:'Habitación 2', color:'#e05050', shortName:'H2' },
  { id:'h3',     name:'Sala / Salón', color:'#5cb85c', shortName:'H3' },
  { id:'h4',     name:'Habitación 4', color:'#5b9bd5', shortName:'H4' },
  { id:'pasillo',name:'Pasillo',       color:'#8090c0', shortName:'PAS' },
  { id:'bano',   name:'Baño',          color:'#d4739a', shortName:'BAÑ' },
  { id:'despensa',name:'Despensa',     color:'#a0b8d0', shortName:'DES' },
  { id:'cocina', name:'Cocina',        color:'#7ec8c8', shortName:'COC' },
];

let appState = { tasks:{}, compra:[], notes:{}, showTaskForm:{}, showCompraForm:false, activeRoom:null, activeTab:'tasks' };
ROOMS_DEF.forEach(r => { appState.tasks[r.id]=[]; appState.notes[r.id]=''; appState.showTaskForm[r.id]=false; });

function load(){
  onValue(proyectoRef, (snapshot) => {
    cargandoDesdeFirebase = true;

    const d = snapshot.val() || {};

    if (d.tasks) appState.tasks = d.tasks;
    if (d.compra) appState.compra = d.compra;
    if (d.notes) appState.notes = d.notes;

    ROOMS_DEF.forEach(r => {
      if (!appState.tasks[r.id]) appState.tasks[r.id] = [];
      if (!appState.notes[r.id]) appState.notes[r.id] = '';
      if (appState.showTaskForm[r.id] === undefined) appState.showTaskForm[r.id] = false;
    });

    firebaseReady = true;

    updateHeader();
    updateOverview();
    updateFloorPlan();
    renderPanel();

    cargandoDesdeFirebase = false;
  });
}

function save(){
  if (!firebaseReady || cargandoDesdeFirebase) return;

  set(proyectoRef, {
    tasks: appState.tasks,
    compra: appState.compra,
    notes: appState.notes
  });
}

load();

function uid(){ return Math.random().toString(36).slice(2,9); }

function roomProgress(id){
  const t=appState.tasks[id]||[];
  if(!t.length) return {pct:0,done:0,total:0};
  const done=t.filter(x=>x.estado==='hecho').length;
  return {pct:Math.round(done/t.length*100),done,total:t.length};
}

function totalStats(){
  let total=0,done=0;
  ROOMS_DEF.forEach(r=>{const p=roomProgress(r.id);total+=p.total;done+=p.done;});
  const cp=appState.compra.length, cb=appState.compra.filter(x=>x.comprado).length;
  return {pct:total?Math.round(done/total*100):0,done,total,cp,cb};
}

function updateHeader(){
  const s=totalStats();
  document.getElementById('stat-pct').textContent=s.pct+'%';
  document.getElementById('stat-tasks').textContent=s.done+'/'+s.total;
  document.getElementById('stat-compra').textContent=s.cb+'/'+s.cp;
}

function updateFloorPlan(){
  ROOMS_DEF.forEach(r=>{
    const p=roomProgress(r.id);
    const el=document.getElementById('prog-'+r.id);
    if(el) el.textContent=p.pct+'%';
    const roomEl=document.getElementById('room-'+r.id);
    if(roomEl){
      if(appState.activeRoom===r.id) roomEl.classList.add('active');
      else roomEl.classList.remove('active');
    }
  });
}

function updateOverview(){
  const s=totalStats();
  document.getElementById('ov-pct').textContent=s.pct+'%';
  document.getElementById('ov-bar').style.width=s.pct+'%';
  const roomsEl=document.getElementById('ov-rooms');
  roomsEl.innerHTML=ROOMS_DEF.map(r=>{
    const p=roomProgress(r.id);
    return `<div class="room-row" onclick="selectRoom('${r.id}')">
      <div class="room-row-dot" style="background:${r.color}"></div>
      <div class="room-row-name">${r.name}</div>
      <div class="room-row-bar"><div class="room-row-fill" style="background:${r.color};width:${p.pct}%"></div></div>
      <div class="room-row-pct">${p.pct}%</div>
    </div>`;
  }).join('');
  const compTot=appState.compra.length, compDone=appState.compra.filter(x=>x.comprado).length;
  const gastado=appState.compra.filter(x=>x.comprado&&x.precio).reduce((s,x)=>s+parseFloat(x.precio||0),0);
  document.getElementById('ov-compra-stats').textContent=compDone+' de '+compTot+' artículos'+(gastado?' · '+gastado.toFixed(0)+'€ gastados':'');
}

function selectRoom(id){
  appState.activeRoom=id;
  appState.showTaskForm[id]=false;
  appState.showCompraForm=false;
  appState.activeTab='tasks';
  renderPanel();
  updateFloorPlan();
}

function closeRoom(){
  appState.activeRoom=null;
  document.getElementById('overview-view').style.display='flex';
  document.getElementById('room-view').style.display='none';
  updateOverview();
  updateFloorPlan();
  updateHeader();
}

function setTab(tab){
  appState.activeTab=tab;
  ['tasks','compra','notas'].forEach(t=>{
    document.getElementById('tc-'+t).classList.toggle('active',t===tab);
    document.getElementById('tab-'+t).classList.toggle('active',t===tab);
  });
}

function renderPanel(){
  const room=ROOMS_DEF.find(r=>r.id===appState.activeRoom);
  if(!room) return;

  document.getElementById('overview-view').style.display='none';
  document.getElementById('room-view').style.display='flex';

  document.getElementById('panel-dot').style.background=room.color;
  document.getElementById('name' in room ? 'panel-name':'panel-name').textContent=room.name;
  document.getElementById('panel-name').textContent=room.name;

  const p=roomProgress(room.id);
  document.getElementById('panel-prog-fill').style.width=p.pct+'%';
  document.getElementById('panel-prog-fill').style.background=room.color;
  document.getElementById('panel-prog-label').textContent=p.done+' de '+p.total+' tareas completadas · '+p.pct+'%';

  setTab(appState.activeTab);
  renderTasks(room);
  renderCompra(room);

  const notesEl=document.getElementById('room-notes');
  if(notesEl) notesEl.value=appState.notes[room.id]||'';

  updateHeader();
  updateFloorPlan();
}

function renderTasks(room){
  const tasks=appState.tasks[room.id]||[];
  const list=document.getElementById('task-list');

  if(!tasks.length){
    list.innerHTML=`<div class="empty-state">Sin tareas todavía.<br>Añade la primera abajo.</div>`;
  } else {
    list.innerHTML=tasks.map((t,i)=>`
      <div class="task-item ${t.estado==='hecho'?'task-done':''}">
        <input type="checkbox" class="task-check" ${t.estado==='hecho'?'checked':''} onchange="toggleTask('${room.id}',${i})">
        <div class="task-content">
          <div class="task-text">${t.texto}</div>
          <div class="task-meta">
            <span class="tag tag-${t.estado==='hecho'?'done':t.estado==='en curso'?'doing':'pending'}">${t.estado}</span>
            ${t.fecha?`<span class="task-date">📅 ${t.fecha}</span>`:''}
          </div>
          ${t.nota?`<div class="task-note">${t.nota}</div>`:''}
        </div>
        <div class="task-actions">
          <select class="state-sel" onchange="changeState('${room.id}',${i},this.value)">
            ${['pendiente','en curso','hecho'].map(s=>`<option value="${s}"${t.estado===s?' selected':''}>${s}</option>`).join('')}
          </select>
          <button class="btn-icon" onclick="deleteTask('${room.id}',${i})">✕</button>
        </div>
      </div>
    `).join('');
  }

  const formArea=document.getElementById('task-form-area');
  if(appState.showTaskForm[room.id]){
    formArea.innerHTML=`
      <div class="add-form">
        <input id="nt-text" placeholder="Descripción de la tarea..." onkeydown="if(event.key==='Enter')addTask('${room.id}')">
        <div class="form-row">
          <select id="nt-state">
            <option value="pendiente">pendiente</option>
            <option value="en curso">en curso</option>
            <option value="hecho">hecho</option>
          </select>
          <input id="nt-date" type="date">
        </div>
        <input id="nt-nota" placeholder="Nota adicional (opcional)..." style="margin-bottom:8px">
        <button class="btn-primary" onclick="addTask('${room.id}')">+ Añadir tarea</button>
      </div>`;
    setTimeout(()=>document.getElementById('nt-text')?.focus(),50);
  } else {
    formArea.innerHTML=`<span class="add-toggle" onclick="toggleTaskForm('${room.id}')">+ añadir tarea</span>`;
  }
}

function renderCompra(room){
  const all=appState.compra.filter(x=>x.roomId===room.id);
  const pendientes=all.filter(x=>!x.comprado);
  const comprados=all.filter(x=>x.comprado);
  const list=document.getElementById('compra-list');

  let html='';
  if(!all.length){ html=`<div class="empty-state">Sin artículos en la lista.<br>Añade el primero abajo.</div>`; }
  else {
    if(pendientes.length){ html+=`<div class="compra-section-title">Por comprar (${pendientes.length})</div>`+pendientes.map(it=>{
      const i=appState.compra.indexOf(it);
      return `<div class="compra-item"><input type="checkbox" class="task-check" onchange="toggleCompra(${i})">
        <span class="compra-text">${it.texto}</span>
        ${it.precio?`<span class="compra-price">${parseFloat(it.precio).toFixed(0)}€</span>`:''}
        <button class="btn-icon" onclick="deleteCompra(${i})">✕</button></div>`;
    }).join(''); }
    if(comprados.length){ html+=`<div class="compra-section-title">Ya comprado (${comprados.length})</div>`+comprados.map(it=>{
      const i=appState.compra.indexOf(it);
      return `<div class="compra-item compra-done"><input type="checkbox" class="task-check" checked onchange="toggleCompra(${i})">
        <span class="compra-text">${it.texto}</span>
        ${it.precio?`<span class="compra-price">${parseFloat(it.precio).toFixed(0)}€</span>`:''}
        <button class="btn-icon" onclick="deleteCompra(${i})">✕</button></div>`;
    }).join(''); }
  }
  list.innerHTML=html;

  const formArea=document.getElementById('compra-form-area');
  if(appState.showCompraForm){
    formArea.innerHTML=`
      <div class="add-form">
        <input id="nc-text" placeholder="Artículo a comprar..." onkeydown="if(event.key==='Enter')addCompra('${room.id}')">
        <div class="form-row">
          <input id="nc-price" type="number" placeholder="Precio €">
          <button class="btn-primary" onclick="addCompra('${room.id}')" style="width:auto;padding:7px 16px">+ Añadir</button>
        </div>
      </div>`;
    setTimeout(()=>document.getElementById('nc-text')?.focus(),50);
  } else {
    formArea.innerHTML=`<span class="add-toggle" onclick="toggleCompraForm()">+ añadir artículo</span>`;
  }
}

function toggleTaskForm(id){ appState.showTaskForm[id]=!appState.showTaskForm[id]; renderPanel(); }
function toggleCompraForm(){ appState.showCompraForm=!appState.showCompraForm; renderPanel(); }

function addTask(id){
  const txt=document.getElementById('nt-text')?.value?.trim();
  if(!txt){ showNotif('Escribe una descripción'); return; }
  appState.tasks[id].push({ id:uid(), texto:txt, estado:document.getElementById('nt-state')?.value||'pendiente', fecha:document.getElementById('nt-date')?.value||'', nota:document.getElementById('nt-nota')?.value||'' });
  appState.showTaskForm[id]=false;
  save(); renderPanel(); showNotif('Tarea añadida ✓');
}

function deleteTask(id,i){ appState.tasks[id].splice(i,1); save(); renderPanel(); }

function toggleTask(id,i){
  const t=appState.tasks[id][i];
  t.estado=t.estado==='hecho'?'pendiente':'hecho';
  save(); renderPanel();
}

function changeState(id,i,val){ appState.tasks[id][i].estado=val; save(); renderPanel(); }

function addCompra(roomId){
  const txt=document.getElementById('nc-text')?.value?.trim();
  if(!txt){ showNotif('Escribe un artículo'); return; }
  appState.compra.push({ id:uid(), roomId, texto:txt, precio:document.getElementById('nc-price')?.value||'', comprado:false });
  appState.showCompraForm=false;
  save(); renderPanel(); updateHeader(); showNotif('Artículo añadido ✓');
}

function deleteCompra(i){ appState.compra.splice(i,1); save(); renderPanel(); updateHeader(); }

function toggleCompra(i){ appState.compra[i].comprado=!appState.compra[i].comprado; save(); renderPanel(); updateHeader(); }

function saveNotes(){
  const id=appState.activeRoom;
  if(id) appState.notes[id]=document.getElementById('room-notes')?.value||'';
  save();
}

function showNotif(msg){
  const el=document.getElementById('notif');
  el.textContent=msg;
  el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'),2000);
}

// Init
updateHeader();
updateOverview();
updateFloorPlan();
</script>
</body>
</html>
